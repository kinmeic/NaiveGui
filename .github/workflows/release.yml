name: Build And Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v1.6.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          version="${tag#v}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Build release artifacts
        env:
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
        run: ./scripts/build-release.sh

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NaiveGui-${{ steps.meta.outputs.tag }}
          path: build/releases/*

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.meta.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" build/releases/* --clobber
          else
            args=(
              "$TAG_NAME"
              build/releases/*
              --title "NaiveGui $TAG_NAME"
              --notes "Automated release generated by GitHub Actions."
            )

            if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
              args+=(--target "${GITHUB_SHA}")
            fi

            gh release create "${args[@]}"
          fi
