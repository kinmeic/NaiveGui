<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5BA0E8"/>
      <stop offset="100%" stop-color="#2C5F9E"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <!-- Dock-safe rounded background with more transparent margin -->
  <rect x="52" y="52" width="408" height="408" rx="96" fill="url(#bg)"/>
  <!-- Subtle inner border -->
  <rect x="58" y="58" width="396" height="396" rx="90" fill="none" stroke="white" stroke-opacity="0.16" stroke-width="2"/>
  <!-- Shield shape (white outline) -->
  <path d="M256 118 L380 170 L380 275 C380 342 330 389 256 408 C182 389 132 342 132 275 L132 170 Z"
        fill="url(#shieldGrad)" stroke="white" stroke-width="9" stroke-linejoin="round"/>
  <!-- Letter N -->
  <text x="255" y="296" text-anchor="middle" font-family="HelveticaNeue-Bold, Helvetica Neue, Arial, sans-serif"
        font-size="154" font-weight="700" fill="white" letter-spacing="-2">
    N
  </text>
</svg>
